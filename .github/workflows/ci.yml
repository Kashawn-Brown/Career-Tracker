name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: career_tracker_test
        ports:
          - 5438:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d career_tracker_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Backend tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5438/career_tracker_test?schema=public
        run: npm run test --workspace=backend

      - name: Backend build (prisma generate + tsc)
        run: npm run build:backend

      - name: Frontend lint
        run: npm run lint --workspace=frontend

      - name: Frontend build
        run: npm run build:frontend